services:
  - type: web
    name: nverly
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/haykgrigoryan22/nverly
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
